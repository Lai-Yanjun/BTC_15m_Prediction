market:
  symbol: "BTC/USDT"
  timeframe: "15m"
  lookback_bars: 1200
  # true 时自动按时间匹配 btc-updown-15m-<slotStartTs>，无需手填下方 id/token/expiry
  auto_update_15m_market: true
  # BTC 15m 市场 slug 前缀
  market_slug_prefix: "btc-updown-15m"
  # Gamma API 基地址
  gamma_api_base: "https://gamma-api.polymarket.com"
  # 当前 Polymarket 市场 condition id（redeem 必填，32-byte hex，长度66，形如 0x...）
  condition_id: ""
  # 绝大多数 yes/no 市场为 false；仅多结果互斥类 neg-risk 市场才设 true（v1 暂不支持）
  neg_risk: false
  # ISO8601 UTC，例如 2026-03-10T17:00:00Z；到期后停止交易并等待结算后更新权益
  expiry_utc: ""

signal:
  # 例如 0.60 表示 only trade when confidence >= 60%
  upper_threshold: 0.52
  lower_threshold: 0.48

trade:
  # auto_update_15m_market=true 时可留空（系统自动更新）
  token_up: ""
  token_down: ""
  # dynamic_sizing=true 时，order_usdc 仅作为兜底/兼容
  order_usdc: 5.0
  dynamic_sizing: true
  # Kelly 固定权益比例（例如 8.5% => 0.085）
  equity_ratio: 0.085
  min_order_usdc: 2.0
  max_order_usdc: 100.0
  # 仅在 live 启动时读余额失败时作为初始权益兜底
  initial_equity_usdc: 100.0
  poll_seconds: 1
  live_enabled: true
  auto_train_if_missing: false
  post_only: false
  cancel_after_sec: 5
  # 到期后等待多少秒再开始轮询结算后余额（2小时=7200）
  settlement_grace_sec: 7200
  # 到期后是否自动执行 claim 命令
  auto_claim_enabled: true
  # 到期后 claim/余额轮询间隔（秒）；900=15分钟
  claim_poll_seconds: 900
  # claim 命令超时（秒）
  claim_timeout_sec: 300
  # 自动结算命令（默认使用项目内置 redeem 脚本）
  claim_command: "python run_settlement.py --config trade_config.yaml"

risk:
  max_orders_per_hour: 20
  # <=0 表示禁用每日额度限制
  max_usdc_per_day: 0
  slippage: 0.03
  min_price: 0.05
  max_price: 0.95

paths:
  model_opt_json: "outputs/opt_15m_details.json"
  model_dir: "models/fixed_15m_stacking"
  output_jsonl: "reports/live_trade_log.jsonl"

model_artifact:
  # true 时：本地缺模型会先下载 zip 并校验后再启动
  enabled: true
  # 推荐填 GitHub Release 直链
  url: "https://github.com/Lai-Yanjun/BTC_15m_Prediction/releases/download/model-2026-03-02/fixed_15m_stacking_release.zip"
  # 可选：zip sha256，填了就强校验
  sha256: "d5c9dcd812a3584f32b4a991ea4ab66cf1e7823327d1e20b15f3d8d1fad3fa83"
  # 要求模型携带最优标记（model_manifest.json）
  require_optimal: true
  # 要求模型类型，默认 ensemble_stacking
  expected_model_name: "ensemble_stacking"
  # 可选：要求与特定 opt 文件哈希一致（来自 build_model_artifact.py 输出）
  expected_opt_sha256: "69c3e4a7ec41285de73265922a76dad544ee8372be5b79b900477c85ea04b2d4"

